<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UND3RGROUND // BLACK MARKET</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik+Glitch&family=Chakra+Petch:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --void: #050505;
            --dark: #0a0a0a;
            --panel: #111111;
            --grid: #1a1a1a;
            --acid: #39ff14;
            --blood: #ff003c;
            --cyan: #00f0ff;
            --amber: #ffbf00;
            --white: #e0e0e0;
            --gray: #666666;
        }

        body {
            font-family: 'Chakra Petch', sans-serif;
            background-color: var(--void);
            color: var(--white);
            overflow-x: hidden;
            min-height: 100vh;
            background-image: 
                linear-gradient(rgba(5,5,5,0.97), rgba(5,5,5,0.97)),
                repeating-linear-gradient(0deg, transparent, transparent 2px, var(--grid) 2px, var(--grid) 4px);
        }

        /* Scanlines */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0,0,0,0.15),
                rgba(0,0,0,0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 9999;
            opacity: 0.3;
        }

        /* Header - Estilo terminal/hacker */
        header {
            background: var(--panel);
            border-bottom: 2px solid var(--acid);
            padding: 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.2);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-family: 'Rubik Glitch', cursive;
            font-size: 2.2rem;
            color: var(--acid);
            text-transform: uppercase;
            letter-spacing: 4px;
            cursor: pointer;
            text-shadow: 0 0 10px rgba(57, 255, 20, 0.5);
            animation: flicker 3s infinite;
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            5% { opacity: 0.8; }
            10% { opacity: 1; }
            15% { opacity: 0.4; }
            20% { opacity: 1; }
        }

        .logo::before {
            content: '[ ';
            color: var(--blood);
        }

        .logo::after {
            content: ' ]';
            color: var(--blood);
        }

        .header-controls {
            display: flex;
            gap: 0.8rem;
            align-items: center;
            flex-wrap: wrap;
        }

        /* Currency - Estilo terminal */
        .currency-toggle {
            background: var(--grid);
            border: 1px solid var(--acid);
            color: var(--acid);
            padding: 0.6rem 1rem;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .currency-toggle::before {
            content: '>';
            margin-right: 0.5rem;
            color: var(--blood);
        }

        .currency-toggle:hover {
            background: var(--acid);
            color: var(--void);
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.6);
        }

        .exchange-rate-display {
            background: var(--grid);
            border-left: 3px solid var(--blood);
            padding: 0.5rem 1rem;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem;
            color: var(--gray);
            text-transform: uppercase;
        }

        .exchange-rate-display .rate-value {
            color: var(--cyan);
            font-weight: bold;
        }

        /* Cart - Estilo alerta */
        .cart-btn {
            background: transparent;
            border: 2px solid var(--blood);
            color: var(--blood);
            padding: 0.6rem 1.2rem;
            font-family: 'Chakra Petch', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            position: relative;
        }

        .cart-btn::after {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: var(--blood);
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .cart-btn:hover {
            color: var(--void);
        }

        .cart-btn:hover::after {
            opacity: 1;
        }

        .cart-count {
            background: var(--blood);
            color: var(--void);
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.8rem;
            font-weight: bold;
        }

        /* Hero - Estilo sistema caído */
        .hero {
            text-align: center;
            padding: 5rem 2rem;
            background: var(--dark);
            border-bottom: 1px solid var(--grid);
            position: relative;
            overflow: hidden;
        }

        .hero::after {
            content: 'SYSTEM_BREACH_DETECTED';
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.7rem;
            color: var(--blood);
            opacity: 0.5;
            animation: blink 2s infinite;
        }

        .hero h1 {
            font-family: 'Rubik Glitch', cursive;
            font-size: 4rem;
            color: var(--acid);
            text-transform: uppercase;
            letter-spacing: 8px;
            margin-bottom: 1rem;
            text-shadow: 
                2px 2px 0 var(--blood),
                -2px -2px 0 var(--cyan);
            animation: glitch 2s infinite;
        }

        @keyframes glitch {
            0%, 90%, 100% { 
                text-shadow: 
                    2px 2px 0 var(--blood),
                    -2px -2px 0 var(--cyan);
                transform: translate(0);
            }
            20% {
                text-shadow: 
                    -2px 2px 0 var(--blood),
                    2px -2px 0 var(--cyan);
                transform: translate(-2px, 2px);
            }
            40% {
                text-shadow: 
                    2px -2px 0 var(--blood),
                    -2px 2px 0 var(--cyan);
                transform: translate(2px, -2px);
            }
        }

        .hero p {
            color: var(--gray);
            font-size: 1rem;
            max-width: 600px;
            margin: 0 auto;
            font-family: 'Share Tech Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .hero-tag {
            display: inline-block;
            background: var(--blood);
            color: var(--void);
            padding: 0.5rem 1.5rem;
            font-family: 'Chakra Petch', sans-serif;
            font-weight: 700;
            font-size: 0.8rem;
            margin-top: 2rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
        }

        /* Categories - Estilo panel de control */
        .categories {
            display: flex;
            justify-content: center;
            gap: 0;
            padding: 2rem;
            flex-wrap: wrap;
            background: var(--panel);
            border-bottom: 1px solid var(--grid);
        }

        .category-btn {
            background: var(--grid);
            border: 1px solid var(--grid);
            color: var(--gray);
            padding: 1rem 2rem;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 0 2px;
            position: relative;
        }

        .category-btn::before {
            content: '[ ]';
            margin-right: 0.5rem;
            color: var(--blood);
        }

        .category-btn:hover {
            border-color: var(--acid);
            color: var(--acid);
            box-shadow: inset 0 0 10px rgba(57, 255, 20, 0.2);
        }

        .category-btn.active {
            background: var(--acid);
            border-color: var(--acid);
            color: var(--void);
            font-weight: 700;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.4);
        }

        .category-btn.active::before {
            content: '[■]';
            color: var(--void);
        }

        /* Products - Estilo archivos corruptos */
        .products-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .product-card {
            background: var(--panel);
            border: 1px solid var(--grid);
            position: relative;
            cursor: pointer;
            transition: all 0.3s;
            overflow: hidden;
        }

        .product-card::before {
            content: 'FILE_' attr(data-id) '.DAT';
            position: absolute;
            top: 5px;
            left: 5px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.6rem;
            color: var(--gray);
            z-index: 10;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .product-card:hover::before {
            opacity: 1;
        }

        .product-card:hover {
            border-color: var(--acid);
            box-shadow: 
                0 0 20px rgba(57, 255, 20, 0.3),
                inset 0 0 20px rgba(57, 255, 20, 0.05);
            transform: translateY(-5px);
        }

        .product-image-container {
            position: relative;
            overflow: hidden;
            height: 280px;
            border-bottom: 1px solid var(--grid);
        }

        .product-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) contrast(1.2);
            transition: all 0.5s;
            display: block;
        }

        .product-card:hover .product-image {
            filter: grayscale(0%) contrast(1.1);
            transform: scale(1.05);
        }

        .product-tag {
            position: absolute;
            top: 0;
            right: 0;
            background: var(--blood);
            color: var(--void);
            padding: 0.3rem 1rem;
            font-family: 'Chakra Petch', sans-serif;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            clip-path: polygon(0 0, 100% 0, 100% 100%, 10% 100%);
        }

        .product-info {
            padding: 1.5rem;
            position: relative;
        }

        .product-info::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, var(--acid), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .product-card:hover .product-info::after {
            opacity: 1;
        }

        .product-category {
            color: var(--cyan);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .product-category::before {
            content: '>';
            color: var(--blood);
        }

        .product-name {
            font-family: 'Chakra Petch', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--white);
            text-transform: uppercase;
            letter-spacing: 1px;
            line-height: 1.2;
        }

        .product-price {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.4rem;
            color: var(--acid);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            letter-spacing: 1px;
        }

        .currency-badge {
            background: var(--grid);
            color: var(--gray);
            padding: 0.2rem 0.5rem;
            font-size: 0.65rem;
            font-family: 'Share Tech Mono', monospace;
            text-transform: uppercase;
            border: 1px solid var(--grid);
        }

        /* Modal - Estilo acceso denegado/concedido */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5,5,5,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            padding: 1rem;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: var(--panel);
            border: 2px solid var(--acid);
            max-width: 700px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            transform: scale(0.95);
            transition: transform 0.3s;
            box-shadow: 
                0 0 0 1px var(--void),
                0 0 0 3px var(--blood),
                0 0 40px rgba(57, 255, 20, 0.3);
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-close {
            position: absolute;
            top: 0;
            right: 0;
            background: var(--blood);
            border: none;
            color: var(--void);
            width: 40px;
            height: 40px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            z-index: 100;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: var(--acid);
            transform: scale(1.1);
        }

        .modal-image-container {
            position: relative;
            height: 300px;
            overflow: hidden;
            border-bottom: 2px solid var(--grid);
        }

        .modal-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: contrast(1.2);
            display: block;
        }

        .modal-body {
            padding: 2rem;
        }

        .modal-title {
            font-family: 'Rubik Glitch', cursive;
            font-size: 2rem;
            color: var(--acid);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 1rem;
            text-shadow: 0 0 10px rgba(57, 255, 20, 0.3);
        }

        .modal-price {
            font-family: 'Share Tech Mono', monospace;
            font-size: 2rem;
            color: var(--acid);
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--grid);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .modal-description {
            color: var(--gray);
            line-height: 1.8;
            margin-bottom: 2rem;
            font-size: 0.95rem;
            border-left: 2px solid var(--blood);
            padding-left: 1rem;
        }

        .features-list {
            list-style: none;
            margin-bottom: 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
        }

        .features-list li {
            padding: 0.6rem;
            background: var(--grid);
            border: 1px solid var(--grid);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--white);
            position: relative;
            padding-left: 1.8rem;
            transition: all 0.3s;
        }

        .features-list li:hover {
            border-color: var(--acid);
            color: var(--acid);
        }

        .features-list li::before {
            content: '>';
            position: absolute;
            left: 0.6rem;
            color: var(--blood);
        }

        .add-to-cart-btn {
            width: 100%;
            background: var(--acid);
            color: var(--void);
            border: none;
            padding: 1rem;
            font-family: 'Chakra Petch', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .add-to-cart-btn::before {
            content: 'EXECUTE_';
            font-family: 'Share Tech Mono', monospace;
        }

        .add-to-cart-btn:hover {
            background: var(--blood);
            box-shadow: 0 0 30px rgba(255, 0, 60, 0.4);
            letter-spacing: 6px;
        }

        /* Cart - Estilo consola de sistema */
        .cart-overlay {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            max-width: 450px;
            height: 100%;
            background: var(--panel);
            border-left: 2px solid var(--acid);
            z-index: 1001;
            transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            box-shadow: -10px 0 50px rgba(0,0,0,0.9);
        }

        .cart-overlay.active {
            right: 0;
        }

        .cart-header {
            background: var(--grid);
            color: var(--acid);
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--acid);
        }

        .cart-header h2 {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .cart-header h2::before {
            content: '>';
            color: var(--blood);
            margin-right: 0.5rem;
        }

        .close-cart {
            background: var(--blood);
            border: none;
            color: var(--void);
            width: 35px;
            height: 35px;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-cart:hover {
            background: var(--acid);
            transform: rotate(90deg);
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            background: var(--dark);
        }

        .cart-item {
            display: flex;
            gap: 1rem;
            padding: 1rem;
            background: var(--panel);
            border: 1px solid var(--grid);
            margin-bottom: 1rem;
            animation: slideIn 0.3s ease;
            position: relative;
            transition: all 0.3s;
        }

        .cart-item:hover {
            border-color: var(--acid);
            box-shadow: inset 0 0 10px rgba(57, 255, 20, 0.1);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .cart-item-image {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border: 1px solid var(--grid);
            filter: grayscale(50%);
            flex-shrink: 0;
        }

        .cart-item-details {
            flex: 1;
        }

        .cart-item-name {
            font-family: 'Chakra Petch', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.3rem;
            color: var(--white);
            text-transform: uppercase;
        }

        .cart-item-price {
            font-family: 'Share Tech Mono', monospace;
            color: var(--acid);
            font-size: 1rem;
        }

        .cart-item-currency {
            font-size: 0.75rem;
            color: var(--gray);
            font-family: 'Share Tech Mono', monospace;
        }

        .remove-item {
            background: transparent;
            border: 1px solid var(--blood);
            color: var(--blood);
            width: 30px;
            height: 30px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .remove-item:hover {
            background: var(--blood);
            color: var(--void);
        }

        .cart-empty {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--gray);
        }

        .cart-empty-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.3;
            color: var(--acid);
        }

        .cart-empty p {
            font-family: 'Share Tech Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9rem;
        }

        .cart-footer {
            padding: 1.5rem;
            background: var(--panel);
            border-top: 2px solid var(--acid);
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.3rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--grid);
            color: var(--white);
        }

        .cart-total-currency {
            font-size: 0.75rem;
            color: var(--gray);
            display: block;
        }

        #cartTotal {
            color: var(--acid);
            font-size: 1.6rem;
        }

        .checkout-btn {
            width: 100%;
            background: transparent;
            color: var(--acid);
            border: 2px solid var(--acid);
            padding: 1rem;
            font-family: 'Chakra Petch', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            position: relative;
            overflow: hidden;
        }

        .checkout-btn::before {
            content: '>';
            color: var(--blood);
        }

        .checkout-btn:hover {
            background: var(--acid);
            color: var(--void);
            box-shadow: 0 0 30px rgba(57, 255, 20, 0.4);
        }

        .checkout-btn:disabled {
            border-color: var(--grid);
            color: var(--gray);
            cursor: not-allowed;
        }

        .checkout-btn:disabled:hover {
            background: transparent;
            box-shadow: none;
        }

        /* Backdrop */
        .backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5,5,5,0.9);
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .backdrop.active {
            opacity: 1;
            visibility: visible;
        }

        /* Toast - Estilo alerta de sistema */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--panel);
            color: var(--acid);
            border: 1px solid var(--acid);
            padding: 1rem 2rem;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            z-index: 2000;
            opacity: 0;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.3);
        }

        .toast::before {
            content: '>> ';
            color: var(--blood);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2.5rem;
                letter-spacing: 4px;
            }

            .products-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }

            .categories {
                padding: 1rem;
            }

            .category-btn {
                padding: 0.8rem 1.2rem;
                font-size: 0.8rem;
                flex: 1;
                min-width: 130px;
            }

            .cart-overlay {
                max-width: 100%;
                border-left: none;
                border-top: 2px solid var(--acid);
                top: auto;
                bottom: -100%;
                right: 0;
                height: 85vh;
                transition: bottom 0.4s ease;
            }
            
            .cart-overlay.active {
                right: 0;
                bottom: 0;
                top: auto;
            }

            .modal-content {
                max-height: 95vh;
            }

            .modal-image-container {
                height: 220px;
            }

            .features-list {
                grid-template-columns: 1fr;
            }

            .exchange-rate-display {
                display: none;
            }

            .header-controls {
                width: 100%;
                justify-content: space-between;
            }

            .logo {
                font-size: 1.8rem;
            }
        }

        @media (max-width: 480px) {
            .hero h1 {
                font-size: 1.8rem;
                letter-spacing: 2px;
            }

            .hero p {
                font-size: 0.8rem;
            }

            .product-name {
                font-size: 1.2rem;
            }

            .modal-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <div class="header-content">
            <div class="logo" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">JD STORE</div>
            
            <div class="header-controls">
                <div class="exchange-rate-display">
                    <span>cambio de moneda // </span>
                    <span class="rate-value" id="exchangeRateDisplay">1_USD = 466.35_VES</span>
                </div>
                
                <button class="currency-toggle" id="currencyToggle" onclick="toggleCurrency()">
                    <span id="currencyText">USD</span>
                </button>
                
                <button class="cart-btn" onclick="toggleCart()">
                    <span>CARRITO</span>
                    <span class="cart-count" id="cartCount">0</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Hero -->
    <section class="hero">
        <h1>JD STORE</h1>
        <p>Acceso no autorizado a inventario de gorras, carteras y bolsos. Sistema operando en modo clandestino.</p>
        <div class="hero-tag">CONEXIÓN ESTABLECIDA</div>
    </section>

    <!-- Categories -->
    <div class="categories">
        <button class="category-btn active" onclick="filterProducts('all', this)">ALL_FILES</button>
        <button class="category-btn" onclick="filterProducts('gorras', this)">GORRAS.EXE</button>
        <button class="category-btn" onclick="filterProducts('carteras', this)">CARTERAS.DAT</button>
        <button class="category-btn" onclick="filterProducts('bolsos', this)">BOLSOS.BIN</button>
    </div>

    <!-- Products -->
    <div class="products-container">
        <div class="products-grid" id="productsGrid"></div>
    </div>

    <!-- Product Modal -->
    <div class="modal-overlay" id="productModal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal()">×</button>
            <div class="modal-image-container">
                <img class="modal-image" id="modalImage" src="" alt="" loading="lazy">
            </div>
            <div class="modal-body">
                <div class="modal-title" id="modalTitle"></div>
                <div class="modal-price" id="modalPrice"></div>
                <p class="modal-description" id="modalDescription"></p>
                <ul class="features-list" id="modalFeatures"></ul>
                <button class="add-to-cart-btn" onclick="addToCartFromModal()">
                    Añadir al carrito
                </button>
            </div>
        </div>
    </div>

    <!-- Cart Sidebar -->
    <div class="backdrop" id="backdrop" onclick="toggleCart()"></div>
    <div class="cart-overlay" id="cartOverlay">
        <div class="cart-header">
            <h2>INVENTORY</h2>
            <button class="close-cart" onclick="toggleCart()">×</button>
        </div>
        <div class="cart-items" id="cartItems">
            <div class="cart-empty">
                <div class="cart-empty-icon">∅</div>
                <p>NO_ITEMS_DETECTED</p>
            </div>
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>TOTAL_AMOUNT<br><small class="cart-total-currency" id="totalCurrency">USD_MODE</small></span>
                <span id="cartTotal">$0.00</span>
            </div>
            <button class="checkout-btn" id="checkoutBtn" onclick="checkoutWhatsApp()" disabled>
                TRANSMIT_ORDER
            </button>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">ITEM_ACQUIRED</div>

    <script>
        // Configuration
        const EXCHANGE_RATE = 466.35;
        let currentCurrency = 'USD';
        let currentCategory = 'all';
        
        const CURRENCY_CONFIG = {
            USD: { symbol: '$', code: 'USD', name: 'USD_MODE', icon: '>' },
            VES: { symbol: 'Bs', code: 'VES', name: 'VES_MODE', icon: '>' }
        };

        // Product Data - Estilo underground
        const products = [
            {
                id: 1,
                name: "TRUCKER_NEON.v1",
                category: "gorras",
                price: 29.99,
                image: "https://101otherlevel.com/cdn/shop/files/Gorra-101-Trucker-Neon-Yellow-side-01.jpg?v=1752562357&width=600",
                description: "Módulo de protección craneal con malla de ventilación. Sistema de ajuste snapback universal. Optimizado para operaciones nocturnas.",
                features: ["Malla_transpirable", "Bordado_3D", "Visera_curvada", "Cierre_snapback"]
            },
            {
                id: 2,
                name: "CHAIN_WALLET.secure",
                category: "carteras",
                price: 89.99,
                image: "https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=500&q=80",
                description: "Dispositivo de almacenamiento portátil con cadena de seguridad. Compartimentos encriptados para tarjetas y activos líquidos.",
                features: ["Cadena_metal", "Cuero_sintetico", "12_ranuras", "Cierre_magnetico"]
            },
            {
                id: 3,
                name: "TACTICAL_BAG.molle",
                category: "bolsos",
                price: 129.99,
                image: "https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=500&q=80",
                description: "Unidad táctica multipropósito con sistema MOLLE. Resistente a agentes externos. Capacidad: 15 litros.",
                features: ["Sistema_MOLLE", "Impermeable", "Correas_acolchadas", "15L_capacidad"]
            },
            {
                id: 4,
                name: "DAD_HAT.legacy",
                category: "gorras",
                price: 34.99,
                image: "https://images.unsplash.com/photo-1521369909029-2afed882baee?w=500&q=80",
                description: "Protocolo de camuflaje urbano con lavado enzimático. Apariencia desgastada para evitar detección.",
                features: ["Algodon_lavado", "Cierre_hebilla", "Parche_bordado", "Visera_desgastada"]
            },
            {
                id: 5,
                name: "STEALTH_WALLET.min",
                category: "carteras",
                price: 59.99,
                image: "https://images.unsplash.com/photo-1627123424574-724758594e93?w=500&q=80",
                description: "Unidad de almacenamiento minimalista. Sin identificadores visibles. Perfil ultra-delgado.",
                features: ["Piel_sintetica", "RFID_block", "3_compartimentos", "Ultra_slim"]
            },
            {
                id: 6,
                name: "SLING_PACK.rapid",
                category: "bolsos",
                price: 79.99,
                image: "https://images.unsplash.com/photo-1590874103328-eac38a683ce7?w=500&q=80",
                description: "Sistema de transporte sling para movimiento táctico. Compartimento oculto integrado.",
                features: ["Diseno_sling", "Correa_cruzada", "Bolsillo_oculto", "Material_balistico"]
            },
            {
                id: 7,
                name: "SNAPBACK.graffiti",
                category: "gorras",
                price: 39.99,
                image: "https://images.unsplash.com/photo-1575428652377-a2d80e2277fc?w=500&q=80",
                description: "Unidad de expresión urbana con estampado de graffiti. Estructura rígida para máxima resistencia.",
                features: ["Estampado_graffiti", "Visera_plana", "Estructura_rigida", "Underground_style"]
            },
            {
                id: 8,
                name: "TECH_WALLET.adv",
                category: "carteras",
                price: 149.99,
                image: "https://www.leanschi.com/media/image/a2/ed/bf/BGTE-CC13.jpg",
                description: "Cartera de alta tecnología con materiales industriales. Sistema de cierres waterproof.",
                features: ["Material_Cordura", "Cierres_YKK", "Impermeable", "Diseno_modular"]
            },
            {
                id: 9,
                name: "DUFFLE_STREET.heavy",
                category: "bolsos",
                price: 199.99,
                image: "https://www.tarstreetsports.com/cdn/shop/files/80B0E822-49C8-4161-BF8F-DF7B2F6EA847.jpg?v=1749468644&width=600",
                description: "Contenedor de alta capacidad para operaciones extendidas. Detalles reflectantes para visibilidad controlada.",
                features: ["40L_capacidad", "Cintas_reflectantes", "Correa_hombro", "Fondo_reforzado"]
            }
        ];

        let cart = [];
        let currentModalProduct = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderProducts('all');
            updateCurrencyDisplay();
            
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    closeModal();
                    if (document.getElementById('cartOverlay').classList.contains('active')) {
                        toggleCart();
                    }
                }
            });
        });

        function toggleCurrency() {
            currentCurrency = currentCurrency === 'USD' ? 'VES' : 'USD';
            updateCurrencyDisplay();
            renderProducts(currentCategory);
            updateCart();
            
            if (currentModalProduct) {
                updateModalPrice(currentModalProduct);
            }
            
            showToast(`MODE_SWITCHED_TO_${CURRENCY_CONFIG[currentCurrency].name}`);
        }

        function updateCurrencyDisplay() {
            const config = CURRENCY_CONFIG[currentCurrency];
            document.getElementById('currencyText').textContent = config.name;
            document.getElementById('totalCurrency').textContent = config.name;
        }

        function formatPrice(usdPrice) {
            const config = CURRENCY_CONFIG[currentCurrency];
            if (currentCurrency === 'USD') {
                return `${config.symbol}${usdPrice.toFixed(2)}`;
            } else {
                const vesPrice = usdPrice * EXCHANGE_RATE;
                return `${config.symbol}_${vesPrice.toLocaleString('es-VE', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
            }
        }

        function getPriceValue(usdPrice) {
            return currentCurrency === 'USD' ? usdPrice : usdPrice * EXCHANGE_RATE;
        }

        function renderProducts(category) {
            currentCategory = category;
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '';
            
            const filtered = category === 'all' 
                ? products 
                : products.filter(p => p.category === category);
            
            if (filtered.length === 0) {
                grid.innerHTML = '<div style="text-align: center; padding: 3rem; color: var(--gray); font-family: Share Tech Mono; text-transform: uppercase;">NO_FILES_FOUND</div>';
                return;
            }
            
            filtered.forEach((product, index) => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.setAttribute('data-id', product.id);
                card.onclick = () => openModal(product);
                
                card.innerHTML = `
                    <div class="product-image-container">
                        <span class="product-tag">NEW</span>
                        <img class="product-image" src="${product.image}" alt="${product.name}" loading="lazy" onerror="this.style.display='none'">
                    </div>
                    <div class="product-info">
                        <div class="product-category">${product.category}</div>
                        <h3 class="product-name">${product.name}</h3>
                        <div class="product-price">
                            ${formatPrice(product.price)}
                            <span class="currency-badge">${currentCurrency}</span>
                        </div>
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }

        function filterProducts(category, btnElement) {
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            btnElement.classList.add('active');
            
            renderProducts(category);
        }

        function openModal(product) {
            currentModalProduct = product;
            
            document.getElementById('modalImage').src = product.image;
            document.getElementById('modalTitle').textContent = product.name;
            updateModalPrice(product);
            document.getElementById('modalDescription').textContent = product.description;
            
            const featuresList = document.getElementById('modalFeatures');
            featuresList.innerHTML = product.features.map(f => `<li>${f}</li>`).join('');
            
            document.getElementById('productModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function updateModalPrice(product) {
            const priceElement = document.getElementById('modalPrice');
            priceElement.innerHTML = `
                ${formatPrice(product.price)}
                <span class="currency-badge">${currentCurrency}</span>
            `;
        }

        function closeModal(event) {
            if (!event || event.target === document.getElementById('productModal')) {
                document.getElementById('productModal').classList.remove('active');
                document.body.style.overflow = '';
                currentModalProduct = null;
            }
        }

        function toggleCart() {
            const cartOverlay = document.getElementById('cartOverlay');
            const backdrop = document.getElementById('backdrop');
            
            cartOverlay.classList.toggle('active');
            backdrop.classList.toggle('active');
            
            if (cartOverlay.classList.contains('active')) {
                document.body.style.overflow = 'hidden';
            } else {
                document.body.style.overflow = '';
            }
        }

        function addToCartFromModal() {
            if (currentModalProduct) {
                addToCart(currentModalProduct);
                closeModal();
            }
        }

        function addToCart(product) {
            const existing = cart.find(item => item.id === product.id);
            
            if (existing) {
                existing.quantity++;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            
            updateCart();
            showToast('ITEM_ACQUIRED_SUCCESSFULLY');
        }

        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            updateCart();
        }

        function updateCart() {
            const cartItems = document.getElementById('cartItems');
            const cartCount = document.getElementById('cartCount');
            const cartTotal = document.getElementById('cartTotal');
            const checkoutBtn = document.getElementById('checkoutBtn');
            
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            cartCount.textContent = totalItems;
            
            if (cart.length === 0) {
                cartItems.innerHTML = `
                    <div class="cart-empty">
                        <div class="cart-empty-icon">∅</div>
                        <p>NO_ITEMS_DETECTED</p>
                    </div>
                `;
                checkoutBtn.disabled = true;
                cartTotal.textContent = formatPrice(0);
            } else {
                cartItems.innerHTML = cart.map(item => {
                    const itemTotal = item.price * item.quantity;
                    return `
                    <div class="cart-item">
                        <img class="cart-item-image" src="${item.image}" alt="${item.name}" loading="lazy" onerror="this.style.display='none'">
                        <div class="cart-item-details">
                            <div class="cart-item-name">${item.name}</div>
                            <div class="cart-item-price">
                                ${formatPrice(item.price)} x ${item.quantity}
                                <div class="cart-item-currency">SUBTOTAL: ${formatPrice(itemTotal)}</div>
                            </div>
                        </div>
                        <button class="remove-item" onclick="removeFromCart(${item.id})">×</button>
                    </div>
                `}).join('');
                checkoutBtn.disabled = false;
                
                const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                cartTotal.textContent = formatPrice(total);
            }
        }

        function checkoutWhatsApp() {
            if (cart.length === 0) return;
            
            // CAMBIA ESTE NÚMERO POR TU WHATSAPP REAL
            const phoneNumber = "1234567890"; // Ejemplo: 584141234567
            
            const config = CURRENCY_CONFIG[currentCurrency];
            
            let message = `*UND3RGR0UND_MARKET_ORDER*%0A%0A`;
            message += `> CLIENT_ID: UNKNOWN%0A`;
            message += `> TIMESTAMP: ${new Date().toISOString()}%0A%0A`;
            message += `> ITEMS_ACQUIRED:%0A`;
            
            cart.forEach(item => {
                const itemPrice = getPriceValue(item.price);
                const itemTotal = getPriceValue(item.price * item.quantity);
                message += `%0A[${item.name}]%0A`;
                message += `  QTY: ${item.quantity} | UNIT: ${config.symbol}${itemPrice.toFixed(2)}%0A`;
                message += `  SUBTOTAL: ${config.symbol}${itemTotal.toFixed(2)}%0A`;
            });
            
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const totalConverted = getPriceValue(total);
            
            message += `%0A> TOTAL_AMOUNT: ${config.symbol}${totalConverted.toLocaleString('es-VE', {minimumFractionDigits: 2, maximumFractionDigits: 2})}%0A`;
            
            if (currentCurrency === 'VES') {
                message += `> USD_EQUIVALENT: $${total.toFixed(2)}%0A`;
            } else {
                message += `> VES_EQUIVALENT: Bs ${(total * EXCHANGE_RATE).toLocaleString('es-VE', {minimumFractionDigits: 2, maximumFractionDigits: 2})}%0A`;
            }
            
            message += `%0A> STATUS: PENDING_CONFIRMATION%0A`;
            message += `> END_TRANSMISSION`;
            
            const whatsappUrl = `https://wa.me/${phoneNumber}?text=${message}`;
            window.open(whatsappUrl, '_blank');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>

</body>
</html>
