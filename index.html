<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URBAN FIT // ACCESORIOS DE CALLE</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;800;900&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --black: #0a0a0a;
            --dark: #111111;
            --gray: #1a1a1a;
            --light-gray: #2a2a2a;
            --neon-green: #ccff00;
            --neon-purple: #bf00ff;
            --neon-orange: #ff4400;
            --white: #ffffff;
            --off-white: #e0e0e0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--black);
            color: var(--white);
            overflow-x: hidden;
            background-image: 
                linear-gradient(rgba(10,10,10,0.9), rgba(10,10,10,0.9)),
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23222' fill-opacity='0.4'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }

        /* Scrollbar personalizada */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--dark);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--neon-green);
            border-radius: 4px;
        }

        /* Glitch effect */
        .glitch {
            position: relative;
            animation: glitch-skew 1s infinite linear alternate-reverse;
        }
        
        @keyframes glitch-skew {
            0% { transform: skew(0deg); }
            20% { transform: skew(-2deg); }
            40% { transform: skew(2deg); }
            60% { transform: skew(0deg); }
            80% { transform: skew(1deg); }
            100% { transform: skew(0deg); }
        }

        /* Header Urbano */
        header {
            background: var(--dark);
            border-bottom: 3px solid var(--neon-green);
            padding: 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 0 30px rgba(204, 255, 0, 0.2);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.5rem;
            font-weight: 400;
            letter-spacing: 4px;
            color: var(--white);
            text-transform: uppercase;
            position: relative;
            text-shadow: 3px 3px 0 var(--neon-purple);
        }

        .logo::after {
            content: '//';
            color: var(--neon-green);
            margin-left: 0.5rem;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .header-controls {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        /* Currency Toggle - Estilo urbano/neón */
        .currency-toggle {
            background: transparent;
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            padding: 0.6rem 1.2rem;
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
        }

        .currency-toggle::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--neon-green);
            transition: left 0.3s ease;
            z-index: -1;
        }

        .currency-toggle:hover::before {
            left: 0;
        }

        .currency-toggle:hover {
            color: var(--black);
            box-shadow: 0 0 20px rgba(204, 255, 0, 0.6);
        }

        .currency-icon {
            margin-right: 0.3rem;
        }

        /* Exchange Rate Display - Estilo técnico */
        .exchange-rate-display {
            background: var(--gray);
            border: 1px solid var(--light-gray);
            padding: 0.5rem 1rem;
            font-family: 'Oswald', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--off-white);
            border-left: 3px solid var(--neon-orange);
        }

        .exchange-rate-display .rate-value {
            color: var(--neon-green);
            font-weight: 700;
        }

        /* Cart Button - Estilo brutalista */
        .cart-btn {
            background: var(--neon-purple);
            border: none;
            color: var(--white);
            padding: 0.8rem 1.5rem;
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            clip-path: polygon(0 0, 100% 0, 100% 70%, 95% 100%, 0 100%);
            position: relative;
            overflow: hidden;
        }

        .cart-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg);
            transition: all 0.5s;
        }

        .cart-btn:hover {
            background: var(--neon-orange);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 68, 0, 0.4);
        }

        .cart-btn:hover::after {
            left: 100%;
        }

        .cart-count {
            background: var(--black);
            color: var(--neon-green);
            width: 24px;
            height: 24px;
            border-radius: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 0.9rem;
            margin-left: 0.5rem;
            border: 1px solid var(--neon-green);
        }

        /* Hero Section - Estilo urbano/graffiti */
        .hero {
            text-align: center;
            padding: 6rem 2rem;
            background: linear-gradient(135deg, var(--dark) 0%, var(--gray) 100%);
            position: relative;
            overflow: hidden;
            border-bottom: 3px solid var(--neon-purple);
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 50px,
                    rgba(204, 255, 0, 0.03) 50px,
                    rgba(204, 255, 0, 0.03) 51px
                );
            pointer-events: none;
        }

        .hero h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 5rem;
            font-weight: 400;
            letter-spacing: 8px;
            margin-bottom: 1rem;
            color: var(--white);
            text-transform: uppercase;
            position: relative;
            z-index: 1;
            text-shadow: 
                4px 4px 0 var(--neon-purple),
                8px 8px 0 rgba(191, 0, 255, 0.3);
            animation: glitch-text 3s infinite;
        }

        @keyframes glitch-text {
            0%, 90%, 100% { 
                text-shadow: 
                    4px 4px 0 var(--neon-purple),
                    8px 8px 0 rgba(191, 0, 255, 0.3);
            }
            92% {
                text-shadow: 
                    -4px 4px 0 var(--neon-green),
                    8px -8px 0 var(--neon-orange);
            }
            94% {
                text-shadow: 
                    4px -4px 0 var(--neon-orange),
                    -8px 8px 0 var(--neon-green);
            }
        }

        .hero p {
            color: var(--off-white);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
            font-family: 'Inter', sans-serif;
            letter-spacing: 1px;
            text-transform: uppercase;
            position: relative;
            z-index: 1;
        }

        .hero-tag {
            display: inline-block;
            background: var(--neon-green);
            color: var(--black);
            padding: 0.5rem 1.5rem;
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            margin-top: 2rem;
            transform: rotate(-2deg);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Categories - Estilo streetwear */
        .categories {
            display: flex;
            justify-content: center;
            gap: 0;
            padding: 3rem 2rem;
            flex-wrap: wrap;
            background: var(--gray);
            border-bottom: 2px solid var(--light-gray);
        }

        .category-btn {
            background: transparent;
            border: 2px solid var(--light-gray);
            color: var(--off-white);
            padding: 1rem 2.5rem;
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 0 -1px;
            position: relative;
            overflow: hidden;
        }

        .category-btn:hover {
            background: var(--light-gray);
            color: var(--white);
            border-color: var(--neon-green);
            z-index: 10;
            box-shadow: 0 0 20px rgba(204, 255, 0, 0.3);
        }

        .category-btn.active {
            background: var(--neon-green);
            color: var(--black);
            border-color: var(--neon-green);
            font-weight: 900;
            z-index: 10;
            box-shadow: 0 0 30px rgba(204, 255, 0, 0.5);
        }

        /* Products Grid - Estilo brutalista/urbano */
        .products-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2.5rem;
        }

        .product-card {
            background: var(--gray);
            border: 2px solid var(--light-gray);
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            clip-path: polygon(0 0, 100% 0, 100% 85%, 95% 100%, 0 100%);
        }

        .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, transparent 30%, rgba(204, 255, 0, 0.1) 50%, transparent 70%);
            transform: translateX(-100%);
            transition: transform 0.6s;
            z-index: 2;
            pointer-events: none;
        }

        .product-card:hover::before {
            transform: translateX(100%);
        }

        .product-card:hover {
            border-color: var(--neon-green);
            transform: translateY(-10px) rotate(1deg);
            box-shadow: 
                0 20px 40px rgba(0,0,0,0.5),
                0 0 40px rgba(204, 255, 0, 0.2);
        }

        .product-image-container {
            position: relative;
            overflow: hidden;
            height: 350px;
        }

        .product-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(20%) contrast(1.1);
            transition: all 0.4s ease;
        }

        .product-card:hover .product-image {
            filter: grayscale(0%) contrast(1.2);
            transform: scale(1.1);
        }

        .product-tag {
            position: absolute;
            top: 1rem;
            left: -2rem;
            background: var(--neon-orange);
            color: var(--white);
            padding: 0.5rem 3rem;
            font-family: 'Oswald', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            transform: rotate(-45deg);
            z-index: 3;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .product-info {
            padding: 1.5rem;
            background: var(--dark);
            border-top: 3px solid var(--light-gray);
        }

        .product-category {
            color: var(--neon-purple);
            font-family: 'Oswald', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .product-category::before {
            content: '//';
            color: var(--neon-green);
        }

        .product-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 2px;
            margin-bottom: 1rem;
            color: var(--white);
            text-transform: uppercase;
            line-height: 1;
        }

        .product-price {
            font-family: 'Oswald', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--neon-green);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            letter-spacing: 1px;
        }

        .currency-badge {
            background: var(--light-gray);
            color: var(--off-white);
            padding: 0.2rem 0.6rem;
            font-size: 0.7rem;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid var(--neon-green);
        }

        /* Product Detail Modal - Estilo cyberpunk/urbano */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: var(--dark);
            border: 3px solid var(--neon-green);
            max-width: 700px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            transform: scale(0.9) rotate(-2deg);
            transition: transform 0.3s ease;
            box-shadow: 
                0 0 0 1px var(--black),
                0 0 0 4px var(--neon-purple),
                0 20px 60px rgba(0,0,0,0.8);
        }

        .modal-overlay.active .modal-content {
            transform: scale(1) rotate(0deg);
        }

        .modal-close {
            position: absolute;
            top: -15px;
            right: -15px;
            background: var(--neon-orange);
            border: 3px solid var(--dark);
            color: var(--white);
            width: 50px;
            height: 50px;
            font-size: 1.5rem;
            font-weight: 700;
            cursor: pointer;
            z-index: 10;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            clip-path: polygon(20% 0%, 80% 0%, 100% 20%, 100% 80%, 80% 100%, 20% 100%, 0% 80%, 0% 20%);
        }

        .modal-close:hover {
            background: var(--neon-green);
            color: var(--black);
            transform: scale(1.1) rotate(90deg);
        }

        .modal-image-container {
            position: relative;
            height: 400px;
            overflow: hidden;
            border-bottom: 3px solid var(--neon-purple);
        }

        .modal-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: contrast(1.2);
        }

        .modal-body {
            padding: 2.5rem;
            background: var(--gray);
        }

        .modal-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.5rem;
            letter-spacing: 4px;
            margin-bottom: 1rem;
            color: var(--white);
            text-transform: uppercase;
            line-height: 1;
            text-shadow: 3px 3px 0 var(--neon-purple);
        }

        .modal-price {
            font-family: 'Oswald', sans-serif;
            font-size: 2.2rem;
            color: var(--neon-green);
            font-weight: 700;
            margin-bottom: 1.5rem;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 1rem;
            border-bottom: 2px solid var(--light-gray);
            padding-bottom: 1rem;
        }

        .modal-description {
            color: var(--off-white);
            line-height: 1.8;
            margin-bottom: 2rem;
            font-size: 1.1rem;
            border-left: 4px solid var(--neon-orange);
            padding-left: 1.5rem;
        }

        .features-list {
            list-style: none;
            margin-bottom: 2.5rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .features-list li {
            padding: 0.8rem;
            background: var(--dark);
            border: 1px solid var(--light-gray);
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
            position: relative;
            padding-left: 2.5rem;
            transition: all 0.3s ease;
        }

        .features-list li:hover {
            border-color: var(--neon-green);
            transform: translateX(5px);
        }

        .features-list li::before {
            content: "▸";
            position: absolute;
            left: 1rem;
            color: var(--neon-green);
            font-size: 1.2rem;
        }

        .add-to-cart-btn {
            width: 100%;
            background: var(--neon-green);
            color: var(--black);
            border: none;
            padding: 1.2rem;
            font-family: 'Oswald', sans-serif;
            font-size: 1.2rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            clip-path: polygon(0 0, 100% 0, 100% 70%, 98% 100%, 0 100%);
            position: relative;
            overflow: hidden;
        }

        .add-to-cart-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s;
        }

        .add-to-cart-btn:hover {
            background: var(--neon-orange);
            color: var(--white);
            box-shadow: 0 10px 40px rgba(255, 68, 0, 0.4);
            transform: translateY(-2px);
        }

        .add-to-cart-btn:hover::before {
            left: 100%;
        }

        /* Cart Sidebar - Estilo industrial */
        .cart-overlay {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            max-width: 450px;
            height: 100%;
            background: var(--dark);
            border-left: 3px solid var(--neon-green);
            z-index: 1001;
            transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            box-shadow: -10px 0 50px rgba(0,0,0,0.8);
        }

        .cart-overlay.active {
            right: 0;
        }

        .cart-header {
            background: var(--gray);
            color: var(--white);
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--neon-purple);
        }

        .cart-header h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .close-cart {
            background: var(--neon-orange);
            border: none;
            color: var(--white);
            width: 40px;
            height: 40px;
            font-size: 1.5rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            clip-path: polygon(20% 0%, 80% 0%, 100% 20%, 100% 80%, 80% 100%, 20% 100%, 0% 80%, 0% 20%);
        }

        .close-cart:hover {
            background: var(--neon-green);
            color: var(--black);
            transform: rotate(90deg);
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            background: var(--black);
        }

        .cart-item {
            display: flex;
            gap: 1rem;
            padding: 1.2rem;
            background: var(--gray);
            border: 2px solid var(--light-gray);
            margin-bottom: 1rem;
            animation: slideIn 0.3s ease;
            position: relative;
            clip-path: polygon(0 0, 100% 0, 100% 85%, 97% 100%, 0 100%);
            transition: all 0.3s ease;
        }

        .cart-item:hover {
            border-color: var(--neon-green);
            transform: translateX(5px);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .cart-item-image {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border: 2px solid var(--neon-purple);
            filter: grayscale(30%);
        }

        .cart-item-details {
            flex: 1;
        }

        .cart-item-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.3rem;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
            color: var(--white);
        }

        .cart-item-price {
            font-family: 'Oswald', sans-serif;
            color: var(--neon-green);
            font-weight: 700;
            font-size: 1.1rem;
        }

        .cart-item-currency {
            font-size: 0.8rem;
            color: var(--off-white);
            font-family: 'Inter', sans-serif;
        }

        .remove-item {
            background: transparent;
            border: 2px solid var(--neon-orange);
            color: var(--neon-orange);
            width: 35px;
            height: 35px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .remove-item:hover {
            background: var(--neon-orange);
            color: var(--white);
            transform: scale(1.1);
        }

        .cart-empty {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--off-white);
        }

        .cart-empty-icon {
            font-size: 5rem;
            margin-bottom: 1.5rem;
            opacity: 0.3;
            color: var(--neon-green);
        }

        .cart-empty p {
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .cart-footer {
            padding: 1.5rem;
            background: var(--gray);
            border-top: 3px solid var(--neon-green);
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 3px;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--light-gray);
            color: var(--white);
        }

        .cart-total-currency {
            font-size: 0.9rem;
            color: var(--neon-purple);
            font-family: 'Inter', sans-serif;
            letter-spacing: 1px;
        }

        #cartTotal {
            color: var(--neon-green);
            font-size: 2rem;
        }

        .checkout-btn {
            width: 100%;
            background: transparent;
            color: var(--neon-green);
            border: 3px solid var(--neon-green);
            padding: 1.2rem;
            font-family: 'Oswald', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            text-decoration: none;
            position: relative;
            overflow: hidden;
            clip-path: polygon(0 0, 100% 0, 100% 70%, 98% 100%, 0 100%);
        }

        .checkout-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--neon-green);
            transition: left 0.3s ease;
            z-index: -1;
        }

        .checkout-btn:hover::before {
            left: 0;
        }

        .checkout-btn:hover {
            color: var(--black);
            box-shadow: 0 0 30px rgba(204, 255, 0, 0.4);
        }

        .checkout-btn:disabled {
            border-color: var(--light-gray);
            color: var(--light-gray);
            cursor: not-allowed;
        }

        .checkout-btn:disabled::before {
            display: none;
        }

        /* Overlay backdrop */
        .backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .backdrop.active {
            opacity: 1;
            visibility: visible;
        }

        /* Toast Notification - Estilo urbano */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--neon-green);
            color: var(--black);
            padding: 1rem 2.5rem;
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            z-index: 2000;
            opacity: 0;
            transition: all 0.3s ease;
            clip-path: polygon(0 0, 100% 0, 100% 70%, 95% 100%, 0 100%);
            box-shadow: 0 10px 30px rgba(204, 255, 0, 0.3);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 3rem;
                letter-spacing: 4px;
            }

            .products-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }

            .categories {
                padding: 1.5rem 1rem;
            }

            .category-btn {
                padding: 0.8rem 1.5rem;
                font-size: 0.9rem;
                letter-spacing: 2px;
            }

            .cart-overlay {
                max-width: 100%;
                border-left: none;
                border-top: 3px solid var(--neon-green);
            }

            .modal-content {
                width: 95%;
                margin: 1rem;
            }

            .features-list {
                grid-template-columns: 1fr;
            }

            .exchange-rate-display {
                display: none;
            }

            .header-controls {
                width: 100%;
                justify-content: space-between;
            }
        }

        /* Animaciones adicionales urbanas */
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(204, 255, 0, 0.1);
            animation: scanline 8s linear infinite;
            pointer-events: none;
            z-index: 9999;
        }
    </style>
</head>
<body>

    <div class="scanline"></div>

    <!-- Header -->
    <header>
        <div class="header-content">
            <div class="logo glitch">URBAN FIT</div>
            
            <div class="header-controls">
                <div class="exchange-rate-display">
                    <span>Tasa //</span>
                    <span class="rate-value" id="exchangeRateDisplay">1$ = 466.35 Bs</span>
                </div>
                
                <button class="currency-toggle" id="currencyToggle" onclick="toggleCurrency()">
                    <span class="currency-icon" id="currencyIcon">💵</span>
                    <span id="currencyText">USD</span>
                </button>
                
                <button class="cart-btn" onclick="toggleCart()">
                    <span>CARRITO</span>
                    <span class="cart-count" id="cartCount">0</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Hero -->
    <section class="hero">
        <h1>ACCESORIOS DE CALLE</h1>
        <p>Gorras, carteras y bolsos para los que dominan el asfalto. Estilo urbano, actitud underground.</p>
        <div class="hero-tag">NUEVA COLECCIÓN 2026</div>
    </section>

    <!-- Categories -->
    <div class="categories">
        <button class="category-btn active" onclick="filterProducts('all')">TODO</button>
        <button class="category-btn" onclick="filterProducts('gorras')">GORRAS</button>
        <button class="category-btn" onclick="filterProducts('carteras')">CARTERAS</button>
        <button class="category-btn" onclick="filterProducts('bolsos')">BOLSOS</button>
    </div>

    <!-- Products -->
    <div class="products-container">
        <div class="products-grid" id="productsGrid">
            <!-- Products will be loaded here -->
        </div>
    </div>

    <!-- Product Modal -->
    <div class="modal-overlay" id="productModal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal()">×</button>
            <div class="modal-image-container">
                <img class="modal-image" id="modalImage" src="" alt="">
            </div>
            <div class="modal-body">
                <div class="modal-title" id="modalTitle"></div>
                <div class="modal-price" id="modalPrice"></div>
                <p class="modal-description" id="modalDescription"></p>
                <ul class="features-list" id="modalFeatures"></ul>
                <button class="add-to-cart-btn" onclick="addToCartFromModal()">
                    AGREGAR AL CARRITO
                </button>
            </div>
        </div>
    </div>

    <!-- Cart Sidebar -->
    <div class="backdrop" id="backdrop" onclick="toggleCart()"></div>
    <div class="cart-overlay" id="cartOverlay">
        <div class="cart-header">
            <h2>TU CARRITO</h2>
            <button class="close-cart" onclick="toggleCart()">×</button>
        </div>
        <div class="cart-items" id="cartItems">
            <div class="cart-empty">
                <div class="cart-empty-icon">🛒</div>
                <p>El carrito está vacío</p>
            </div>
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>TOTAL<br><small class="cart-total-currency" id="totalCurrency">EN USD</small></span>
                <span id="cartTotal">$0.00</span>
            </div>
            <button class="checkout-btn" id="checkoutBtn" onclick="checkoutWhatsApp()" disabled>
                <span>📱</span> COMPRAR POR WHATSAPP
            </button>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">PRODUCTO AGREGADO</div>

    <script>
        // Configuration
        const EXCHANGE_RATE = 466.35;
        let currentCurrency = 'USD';
        
        const CURRENCY_CONFIG = {
            USD: { symbol: '$', code: 'USD', name: 'DÓLARES', icon: '💵' },
            VES: { symbol: 'Bs', code: 'VES', name: 'BOLÍVARES', icon: '🇻🇪' }
        };

        // Product Data - Estilo urbano
        const products = [
            {
                id: 1,
                name: "GORRA TRUCKER NEÓN",
                category: "gorras",
                price: 29.99,
                image: "https://images.unsplash.com/photo-1534215754734-18e55cf13f20?w=500",
                description: "Gorra trucker con malla trasera y visera curvada. Diseño neón para destacar en la noche. Ajuste snapback universal.",
                features: ["Malla transpirable", "Bordado 3D", "Visera curvada", "Cierre snapback"]
            },
            {
                id: 2,
                name: "CARTERA CHAIN WALLET",
                category: "carteras",
                price: 89.99,
                image: "https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=500",
                description: "Cartera de cuero sintético con cadena metálica. Estilo punk/urbano con compartimentos para tarjetas y billetes.",
                features: ["Cadena de metal", "Cuero sintético premium", "12 ranuras", "Cierre magnético"]
            },
            {
                id: 3,
                name: "BOLSO TÁCTICO URBAN",
                category: "bolsos",
                price: 129.99,
                image: "https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=500",
                description: "Bolso táctico multipropósito con sistema MOLLE. Diseño militar adaptado para la ciudad. Resistente al agua.",
                features: ["Sistema MOLLE", "Impermeable", "Correas acolchadas", "15L capacidad"]
            },
            {
                id: 4,
                name: "GORRA DAD HAT VINTAGE",
                category: "gorras",
                price: 34.99,
                image: "https://images.unsplash.com/photo-1521369909029-2afed882baee?w=500",
                description: "Gorra estilo dad hat con lavado vintage. Look desgastado auténtico para el estilo retro urbano.",
                features: ["Algodón lavado", "Cierre de hebilla", "Parche bordado", "Visera desgastada"]
            },
            {
                id: 5,
                name: "CARTERA MINIMALISTA STEALTH",
                category: "carteras",
                price: 59.99,
                image: "https://images.unsplash.com/photo-1627123424574-724758594e93?w=500",
                description: "Cartera compacta negra mate. Diseño minimalista sin logos para un look limpio y urbano.",
                features: ["Piel sintética mate", "RFID blocking", "3 compartimentos", "Ultra slim"]
            },
            {
                id: 6,
                name: "BOLSO CROSSBODY SLING",
                category: "bolsos",
                price: 79.99,
                image: "https://images.unsplash.com/photo-1590874103328-eac38a683ce7?w=500",
                description: "Bolso bandolera tipo sling para movimiento rápido. Perfecto para skate y movilidad urbana.",
                features: ["Diseño sling", "Correa cruzada", "Bolsillo oculto", "Material balístico"]
            },
            {
                id: 7,
                name: "GORRA SNAPBACK GRAFFITI",
                category: "gorras",
                price: 39.99,
                image: "https://images.unsplash.com/photo-1575428652377-a2d80e2277fc?w=500",
                description: "Snapback con estampado de graffiti urbano. Visera plana y estructura rígida para el look hip-hop clásico.",
                features: ["Estampado graffiti", "Visera plana", "Estructura rígida", "Underground style"]
            },
            {
                id: 8,
                name: "CARTERA TECH WEAR",
                category: "carteras",
                price: 149.99,
                image: "https://images.unsplash.com/photo-1606503825008-909a6184adcb?w=500",
                description: "Cartera de tech wear con materiales industriales. Cierres waterproof y diseño futurista.",
                features: ["Material Cordura", "Cierres YKK", "Impermeable", "Diseño modular"]
            },
            {
                id: 9,
                name: "BOLSO DUFFLE STREET",
                category: "bolsos",
                price: 199.99,
                image: "https://images.unsplash.com/photo-1551632436-cbf8dd354ca8?w=500",
                description: "Bolso duffle grande para sesiones de skate o viajes cortos. Estilo industrial con detalles reflectantes.",
                features: ["40L capacidad", "Cintas reflectantes", "Correa de hombro", "Fondo reforzado"]
            }
        ];

        let cart = [];
        let currentModalProduct = null;

        document.addEventListener('DOMContentLoaded', () => {
            renderProducts('all');
            updateCurrencyDisplay();
        });

        function toggleCurrency() {
            const btn = document.getElementById('currencyToggle');
            btn.style.transform = 'scale(0.95)';
            
            setTimeout(() => {
                currentCurrency = currentCurrency === 'USD' ? 'VES' : 'USD';
                updateCurrencyDisplay();
                renderProducts(document.querySelector('.category-btn.active').textContent.toLowerCase() === 'todo' ? 'all' : 
                    document.querySelector('.category-btn.active').textContent.toLowerCase());
                updateCart();
                
                if (currentModalProduct) {
                    updateModalPrice(currentModalProduct);
                }
                
                btn.style.transform = 'scale(1)';
                showToast(`MONEDA CAMBIADA A ${CURRENCY_CONFIG[currentCurrency].name}`);
            }, 150);
        }

        function updateCurrencyDisplay() {
            const config = CURRENCY_CONFIG[currentCurrency];
            document.getElementById('currencyIcon').textContent = config.icon;
            document.getElementById('currencyText').textContent = config.code;
            document.getElementById('totalCurrency').textContent = `EN ${config.name}`;
        }

        function formatPrice(usdPrice) {
            const config = CURRENCY_CONFIG[currentCurrency];
            if (currentCurrency === 'USD') {
                return `${config.symbol}${usdPrice.toFixed(2)}`;
            } else {
                const vesPrice = usdPrice * EXCHANGE_RATE;
                return `${config.symbol} ${vesPrice.toLocaleString('es-VE', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
            }
        }

        function getPriceValue(usdPrice) {
            return currentCurrency === 'USD' ? usdPrice : usdPrice * EXCHANGE_RATE;
        }

        function renderProducts(category) {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '';
            
            const filtered = category === 'all' 
                ? products 
                : products.filter(p => p.category === category);
            
            filtered.forEach((product, index) => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.style.animationDelay = `${index * 0.1}s`;
                card.onclick = () => openModal(product);
                
                card.innerHTML = `
                    <div class="product-image-container">
                        <span class="product-tag">NUEVO</span>
                        <img class="product-image" src="${product.image}" alt="${product.name}" loading="lazy">
                    </div>
                    <div class="product-info">
                        <div class="product-category">${product.category}</div>
                        <h3 class="product-name">${product.name}</h3>
                        <div class="product-price">
                            ${formatPrice(product.price)}
                            <span class="currency-badge">${currentCurrency}</span>
                        </div>
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }

        function filterProducts(category) {
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active');
                const btnText = btn.textContent.toLowerCase();
                if ((category === 'all' && btnText === 'todo') || btnText === category) {
                    btn.classList.add('active');
                }
            });
            
            renderProducts(category);
        }

        function openModal(product) {
            currentModalProduct = product;
            document.getElementById('modalImage').src = product.image;
            document.getElementById('modalTitle').textContent = product.name;
            updateModalPrice(product);
            document.getElementById('modalDescription').textContent = product.description;
            
            const featuresList = document.getElementById('modalFeatures');
            featuresList.innerHTML = product.features.map(f => `<li>${f}</li>`).join('');
            
            document.getElementById('productModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function updateModalPrice(product) {
            const priceElement = document.getElementById('modalPrice');
            priceElement.innerHTML = `
                ${formatPrice(product.price)}
                <span class="currency-badge">${currentCurrency}</span>
            `;
        }

        function closeModal(event) {
            if (!event || event.target === document.getElementById('productModal')) {
                document.getElementById('productModal').classList.remove('active');
                document.body.style.overflow = '';
                currentModalProduct = null;
            }
        }

        function toggleCart() {
            document.getElementById('cartOverlay').classList.toggle('active');
            document.getElementById('backdrop').classList.toggle('active');
            document.body.style.overflow = document.getElementById('cartOverlay').classList.contains('active') ? 'hidden' : '';
        }

        function addToCartFromModal() {
            if (currentModalProduct) {
                addToCart(currentModalProduct);
                closeModal();
            }
        }

        function addToCart(product) {
            const existing = cart.find(item => item.id === product.id);
            
            if (existing) {
                existing.quantity++;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            
            updateCart();
            showToast('PRODUCTO AGREGADO AL CARRITO');
        }

        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            updateCart();
        }

        function updateCart() {
            const cartItems = document.getElementById('cartItems');
            const cartCount = document.getElementById('cartCount');
            const cartTotal = document.getElementById('cartTotal');
            const checkoutBtn = document.getElementById('checkoutBtn');
            
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            cartCount.textContent = totalItems;
            
            if (cart.length === 0) {
                cartItems.innerHTML = `
                    <div class="cart-empty">
                        <div class="cart-empty-icon">🛒</div>
                        <p>EL CARRITO ESTÁ VACÍO</p>
                    </div>
                `;
                checkoutBtn.disabled = true;
                cartTotal.textContent = formatPrice(0);
            } else {
                cartItems.innerHTML = cart.map(item => {
                    const itemTotal = item.price * item.quantity;
                    return `
                    <div class="cart-item">
                        <img class="cart-item-image" src="${item.image}" alt="${item.name}">
                        <div class="cart-item-details">
                            <div class="cart-item-name">${item.name}</div>
                            <div class="cart-item-price">
                                ${formatPrice(item.price)} x ${item.quantity}
                                <div class="cart-item-currency">Total: ${formatPrice(itemTotal)}</div>
                            </div>
                        </div>
                        <button class="remove-item" onclick="removeFromCart(${item.id})">×</button>
                    </div>
                `}).join('');
                checkoutBtn.disabled = false;
                
                const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                cartTotal.textContent = formatPrice(total);
            }
        }

        function checkoutWhatsApp() {
            if (cart.length === 0) return;
            
            const phoneNumber = "1234567890";
            const config = CURRENCY_CONFIG[currentCurrency];
            
            let message = `*PEDIDO URBAN FIT*%0A%0A`;
            
            cart.forEach(item => {
                const itemPrice = getPriceValue(item.price);
                const itemTotal = getPriceValue(item.price * item.quantity);
                message += `▸ ${item.name}%0A`;
                message += `  ${config.symbol}${itemPrice.toFixed(2)} x ${item.quantity} = ${config.symbol}${itemTotal.toFixed(2)} ${config.code}%0A%0A`;
            });
            
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const totalConverted = getPriceValue(total);
            
            message += `*TOTAL: ${config.symbol}${totalConverted.toLocaleString('es-VE', {minimumFractionDigits: 2, maximumFractionDigits: 2})} ${config.code}*%0A`;
            
            if (currentCurrency === 'VES') {
                message += `(Equivalente a $${total.toFixed(2)} USD)%0A%0A`;
            } else {
                message += `(Equivalente a Bs ${(total * EXCHANGE_RATE).toLocaleString('es-VE', {minimumFractionDigits: 2, maximumFractionDigits: 2)})%0A%0A`;
            }
            
            message += "Confirmar disponibilidad y método de pago. 🔥";
            
            const whatsappUrl = `https://wa.me/${phoneNumber}?text=${message}`;
            window.open(whatsappUrl, '_blank');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
                if (document.getElementById('cartOverlay').classList.contains('active')) {
                    toggleCart();
                }
            }
        });
    </script>

</body>
</html>
